<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#333">AI概念层次关系图</text>
  
  <!-- AI 核心概念 -->
  <g transform="translate(400, 120)">
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="#4a6fa5" stroke="#2c3e50" stroke-width="3"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">AI</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="white">人工智能能力集合</text>
  </g>
  
  <!-- 大模型 -->
  <g transform="translate(400, 250)">
    <rect x="-100" y="-40" width="200" height="80" rx="10" fill="#6b8e23" stroke="#2e8b57" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">大模型</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="12" fill="white">压缩知识引擎</text>
    <line x1="0" y1="-40" x2="0" y2="-60" stroke="#2c3e50" stroke-width="2"/>
  </g>
  
  <!-- 连接线 -->
  <path d="M 400 180 Q 400 210 400 210" stroke="#2c3e50" stroke-width="2" fill="none"/>
  
  <!-- 各种AI工具 -->
  <!-- AI Chat -->
  <g transform="translate(150, 400)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#ff6b6b" stroke="#ee5a5a" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">AI Chat</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="11" fill="white">对话问答</text>
  </g>
  
  <!-- AI Search -->
  <g transform="translate(300, 400)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#4ecdc4" stroke="#45b7aa" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">AI Search</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="11" fill="white">资料检索</text>
  </g>
  
  <!-- Agent -->
  <g transform="translate(450, 400)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#ffd166" stroke="#ffbc42" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Agent</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="11" fill="white">任务执行</text>
  </g>
  
  <!-- AI Coding -->
  <g transform="translate(600, 400)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#a06cd5" stroke="#8e5cc4" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">AI Coding</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="11" fill="white">代码辅助</text>
  </g>
  
  <!-- 连接线从大模型到各工具 -->
  <g stroke="#2c3e50" stroke-width="1.5" fill="none">
    <path d="M 400 290 Q 300 340 150 370"/>
    <path d="M 400 290 Q 350 340 300 370"/>
    <path d="M 400 290 Q 450 340 450 370"/>
    <path d="M 400 290 Q 500 340 600 370"/>
  </g>
  
  <!-- 注释说明 -->
  <g transform="translate(400, 520)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" fill="#555">AI = 人工智能能力集合，大模型是其核心引擎</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial" font-size="14" fill="#555">各工具基于大模型构建，适用于不同场景</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial" font-size="14" fill="#555">选择工具取决于任务需求，而非工具"高级程度"</text>
  </g>
</svg>