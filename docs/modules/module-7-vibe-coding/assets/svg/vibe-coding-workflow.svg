<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#2c3e50">Vibe Coding 工作流</text>
  <text x="450" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#7f8c8d">意图重于语法，上下文即生命线</text>
  
  <!-- 核心哲学 -->
  <g transform="translate(450, 120)">
    <rect x="-250" y="-30" width="500" height="60" rx="8" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">核心哲学</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="14" fill="white">意图 > 语法 | 上下文为王 | Memory Bank</text>
  </g>
  
  <!-- Memory Bank 工作流 -->
  <!-- 初始化 -->
  <g transform="translate(150, 220)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">1. 初始化</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">建立项目元数据</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="white">README, Architecture</text>
  </g>
  
  <!-- 规划 -->
  <g transform="translate(350, 220)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">2. 规划</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">编写实施计划</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="white">拆解大任务为小步</text>
  </g>
  
  <!-- 对齐 -->
  <g transform="translate(550, 220)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#f39c12" stroke="#d35400" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">3. 对齐</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">AI确认计划</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="white">澄清循环</text>
  </g>
  
  <!-- 执行 -->
  <g transform="translate(750, 220)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">4. 执行</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">每次一小步</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="white">避免上下文过载</text>
  </g>
  
  <!-- 验证 -->
  <g transform="translate(650, 350)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">5. 验证</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">测试或手动确认</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="white">通过才进入下一步</text>
  </g>
  
  <!-- 同步 -->
  <g transform="translate(450, 350)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">6. 同步</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">更新进度文档</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="white">确保上下文连续</text>
  </g>
  
  <!-- 连接箭头 -->
  <g fill="none" stroke="#2c3e50" stroke-width="2">
    <!-- 初始化 -> 规划 -->
    <path d="M 230 220 L 270 220" marker-end="url(#arrow)"/>
    <!-- 规划 -> 对齐 -->
    <path d="M 430 220 L 470 220" marker-end="url(#arrow)"/>
    <!-- 对齐 -> 执行 -->
    <path d="M 630 220 L 670 220" marker-end="url(#arrow)"/>
    <!-- 执行 -> 验证 -->
    <path d="M 750 255 L 730 315" marker-end="url(#arrow)"/>
    <!-- 验证 -> 同步 -->
    <path d="M 570 350 L 530 350" marker-end="url(#arrow)"/>
    <!-- 同步 -> 执行（循环） -->
    <path d="M 450 315 Q 600 280 670 220" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  </g>
  
  <!-- 定义箭头 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- 澄清循环 -->
  <g transform="translate(550, 150)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="10" fill="#d35400">澄清循环</text>
  </g>
  
  <!-- 回滚技术 -->
  <g transform="translate(750, 350)">
    <rect x="-60" y="-25" width="120" height="50" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">回滚技术</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="11" fill="white">果断使用Git撤销</text>
  </g>
  
  <!-- 连接验证到回滚 -->
  <path d="M 730 315 L 730 325" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <!-- Memory Bank 文档 -->
  <g transform="translate(450, 450)">
    <rect x="-300" y="-40" width="600" height="80" rx="8" fill="#8e44ad" stroke="#7d3c98" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Memory Bank 文档体系</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="12" fill="white">PRD（产品需求）| Architecture（架构设计）| Implementation Plan（实施计划）| Progress（进度记录）</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial" font-size="12" fill="white">随项目演进的动态文档，确保跨会话上下文一致性</text>
  </g>
  
  <!-- 角色对比 -->
  <g transform="translate(450, 560)">
    <rect x="-250" y="-30" width="500" height="60" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">传统编程：工头自己搬砖 | AI辅助：工头指挥AI搬砖 | Vibe Coding：总规划师审核图纸</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="12" fill="white">砖歪了直接拆掉重来，而不是在歪砖上加料</text>
  </g>
  
  <!-- 注释 -->
  <g transform="translate(450, 640)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" fill="#2c3e50">Vibe Coding = 精准图纸（Context）+ 逐步审核（Verification）+ 果断回滚（Rewind）</text>
  </g>
</svg>