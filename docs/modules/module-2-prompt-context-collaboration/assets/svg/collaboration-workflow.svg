<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#f5f7fa"/>
  
  <!-- 标题 -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#2c3e50">人机协作工作流</text>
  
  <!-- 定义箭头 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- 人类角色 -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="60" fill="#e74c3c" stroke="#c0392b" stroke-width="3"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">人</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="12" fill="white">目标与判断</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial" font-size="11" fill="white">负责定义问题</text>
  </g>
  
  <!-- AI角色 -->
  <g transform="translate(450, 150)">
    <circle cx="0" cy="0" r="60" fill="#3498db" stroke="#2980b9" stroke-width="3"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">AI</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="12" fill="white">生成与整理</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial" font-size="11" fill="white">处理信息与内容</text>
  </g>
  
  <!-- 工具角色 -->
  <g transform="translate(750, 150)">
    <circle cx="0" cy="0" r="60" fill="#2ecc71" stroke="#27ae60" stroke-width="3"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">工具</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="12" fill="white">执行与验证</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial" font-size="11" fill="white">自动化操作</text>
  </g>
  
  <!-- 协作流程箭头 -->
  <!-- 人 -> AI：提供提示词和上下文 -->
  <path d="M 210 150 Q 330 100 390 150" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="300" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">提示词+上下文</text>
  
  <!-- AI -> 人：返回结果 -->
  <path d="M 390 180 Q 330 230 210 180" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  <text x="300" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#3498db">生成内容</text>
  
  <!-- AI -> 工具：调用工具 -->
  <path d="M 510 150 Q 630 100 690 150" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="600" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">调用命令/API</text>
  
  <!-- 工具 -> AI：返回执行结果 -->
  <path d="M 690 180 Q 630 230 510 180" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  <text x="600" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#3498db">执行结果</text>
  
  <!-- 提示词工程部分 -->
  <g transform="translate(450, 320)">
    <rect x="-150" y="-40" width="300" height="80" rx="8" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">提示词工程</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">结构化任务卡：目标、参考、边界、格式</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="12" fill="white">确保AI理解上下文并稳定输出</text>
  </g>
  
  <!-- 连接线 -->
  <line x1="450" y1="210" x2="450" y2="280" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 元提示词说明 -->
  <g transform="translate(450, 420)">
    <rect x="-120" y="-25" width="240" height="50" rx="5" fill="#f39c12" stroke="#d35400" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">元提示词</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial" font-size="12" fill="white">约束AI工作方式的提示词</text>
  </g>
  
  <!-- 注释 -->
  <g transform="translate(450, 480)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="12" fill="#7f8c8d">良好的协作需要明确分工和稳定接口</text>
  </g>
</svg>