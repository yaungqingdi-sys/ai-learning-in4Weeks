<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8f9fa" rx="10" ry="10"/>
  
  <!-- User Intent -->
  <rect x="50" y="160" width="120" height="80" rx="8" fill="#e7f3ff" stroke="#007bff" stroke-width="2"/>
  <text x="110" y="195" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">用户 (You)</text>
  <text x="110" y="215" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">提出“规格” (Spec)</text>

  <!-- Superpowers Agent -->
  <circle cx="300" cy="200" r="70" fill="#fff3cd" stroke="#ffc107" stroke-width="3"/>
  <text x="300" y="195" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Superpowers</text>
  <text x="300" y="215" font-family="Arial" font-size="12" text-anchor="middle" fill="#856404">AI 智能体代理</text>

  <!-- Capabilities/Tools -->
  <rect x="430" y="80" width="130" height="60" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="495" y="115" font-family="Arial" font-size="14" text-anchor="middle">文件系统 (Excel/PDF)</text>
  
  <rect x="430" y="170" width="130" height="60" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="495" y="205" font-family="Arial" font-size="14" text-anchor="middle">数据库 (SQL)</text>
  
  <rect x="430" y="260" width="130" height="60" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="495" y="295" font-family="Arial" font-size="14" text-anchor="middle">代码执行 (Python)</text>

  <!-- Connections -->
  <line x1="170" y1="200" x2="230" y2="200" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="180" x2="430" y2="120" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="200" x2="430" y2="200" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="220" x2="430" y2="280" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
  </defs>
</svg>
