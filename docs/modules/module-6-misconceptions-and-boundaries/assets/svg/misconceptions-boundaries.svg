<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#f5f7fa"/>
  
  <!-- 标题 -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#2c3e50">AI使用误区与边界意识</text>
  <text x="450" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#7f8c8d">建立"先验证、再相信"的基本习惯</text>
  
  <!-- 三个边界 -->
  <!-- 任务边界 -->
  <g transform="translate(200, 180)">
    <rect x="-100" y="-60" width="200" height="120" rx="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-40" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">任务边界</text>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="14" fill="white">什么该自己判断</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">- 业务逻辑决策</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="12" fill="white">- 价值观判断</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffcccc">需结合专业知识和具体场景</text>
  </g>
  
  <!-- 验证边界 -->
  <g transform="translate(450, 180)">
    <rect x="-100" y="-60" width="200" height="120" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-40" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">验证边界</text>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="14" fill="white">什么必须验证</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">- 技术实现细节</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="12" fill="white">- 关键数据准确性</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial" font-size="11" fill="#cce5ff">测试、对照、原文检查</text>
  </g>
  
  <!-- 责任边界 -->
  <g transform="translate(700, 180)">
    <rect x="-100" y="-60" width="200" height="120" rx="10" fill="#2ecc71" stroke="#27ae60" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-40" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">责任边界</text>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="14" fill="white">什么不能外包</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="white">- 安全相关决策</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="12" fill="white">- 最终结果负责</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial" font-size="11" fill="#ccffcc">始终需要人工监督</text>
  </g>
  
  <!-- 常见误区 -->
  <g transform="translate(450, 350)">
    <rect x="-250" y="-40" width="500" height="80" rx="8" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">常见误区</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="12" fill="white">过度依赖：把AI当答案机器 → 应视为协作工具</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial" font-size="12" fill="white">收藏代替学习：只存材料不加工 → 需要输出和测试</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial" font-size="12" fill="white">验证缺失：看到顺就信 → 需要测试、对照、推理检查</text>
  </g>
  
  <!-- 真正的学习进步 -->
  <g transform="translate(450, 480)">
    <rect x="-200" y="-30" width="400" height="60" rx="8" fill="#f39c12" stroke="#d35400" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">真正的学习进步</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="14" fill="white">能解释 + 能做最小练习 + 能指出边界</text>
  </g>
  
  <!-- 注释 -->
  <g transform="translate(450, 560)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="14" fill="#2c3e50">边界感不是降速，而是防止朝错误方向越跑越远</text>
  </g>
  
  <!-- 连接线 -->
  <g stroke="#7f8c8d" stroke-width="1" stroke-dasharray="3,3">
    <line x1="200" y1="240" x2="200" y2="310"/>
    <line x1="450" y1="240" x2="450" y2="310"/>
    <line x1="700" y1="240" x2="700" y2="310"/>
  </g>
</svg>