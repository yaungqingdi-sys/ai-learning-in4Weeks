<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="700" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="360" y="40" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">个人知识库工作流</text>

  <!-- Node A: 原始资料收集 -->
  <rect x="220" y="60" width="280" height="56" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">原始资料收集</text>
  <text x="360" y="102" text-anchor="middle" font-size="12" fill="#475569">网页 / 论文 / 笔记 / 代码</text>

  <!-- Arrow A -> B -->
  <line x1="360" y1="116" x2="360" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node B: LLM 编译 -->
  <rect x="220" y="144" width="280" height="56" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="167" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">LLM 编译</text>
  <text x="360" y="186" text-anchor="middle" font-size="12" fill="#475569">分类、摘要、建立链接</text>

  <!-- Arrow B -> C -->
  <line x1="360" y1="200" x2="360" y2="224" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node C: 结构化 Wiki (central hub) -->
  <rect x="210" y="228" width="300" height="60" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="253" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">结构化 Wiki</text>
  <text x="360" y="273" text-anchor="middle" font-size="12" fill="#475569">Markdown 文件目录</text>

  <!-- Arrow C -> D -->
  <line x1="360" y1="288" x2="360" y2="318" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node D: Q&A 与探索 -->
  <rect x="220" y="322" width="280" height="56" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">Q&amp;A 与探索</text>
  <text x="360" y="364" text-anchor="middle" font-size="12" fill="#475569">对 Wiki 提问、研究</text>

  <!-- Arrow D -> E -->
  <line x1="360" y1="378" x2="360" y2="408" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node E: 输出与可视化 -->
  <rect x="220" y="412" width="280" height="56" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#9d174d">输出与可视化</text>
  <text x="360" y="454" text-anchor="middle" font-size="12" fill="#475569">报告 / 幻灯片 / 图表</text>

  <!-- Arrow E -> F -->
  <line x1="360" y1="468" x2="360" y2="498" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node F: 回填 Wiki -->
  <rect x="220" y="502" width="280" height="56" rx="10" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="525" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">回填 Wiki</text>
  <text x="360" y="544" text-anchor="middle" font-size="12" fill="#475569">把探索结果归档</text>

  <!-- Arrow F -> C (loop back, left side) -->
  <line x1="220" y1="530" x2="160" y2="530" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="160" y1="530" x2="160" y2="258" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="160" y1="258" x2="206" y2="258" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="130" y="400" text-anchor="middle" font-size="11" fill="#22c55e" transform="rotate(-90,130,400)">持续积累</text>

  <!-- Node G: 健康检查 Linting (right side) -->
  <rect x="540" y="228" width="160" height="60" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="251" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">健康检查</text>
  <text x="620" y="271" text-anchor="middle" font-size="11" fill="#475569">查不一致、补缺失</text>

  <!-- Arrow C -> G -->
  <line x1="510" y1="250" x2="536" y2="250" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow G -> C -->
  <line x1="540" y1="268" x2="514" y2="268" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="220" y="590" width="280" height="90" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="360" y="612" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">图例</text>
  <line x1="240" y1="630" x2="280" y2="630" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="634" font-size="11" fill="#475569">数据流向</text>
  <line x1="380" y1="630" x2="420" y2="630" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="430" y="634" font-size="11" fill="#475569">回填循环</text>
  <line x1="240" y1="656" x2="280" y2="656" stroke="#eab308" stroke-width="1.5"/>
  <text x="290" y="660" font-size="11" fill="#475569">双向维护</text>
</svg>
