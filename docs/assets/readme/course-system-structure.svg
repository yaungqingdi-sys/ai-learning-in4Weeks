<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">课程系统结构图</title>
  <desc id="desc">展示课程目录、模块、考核、Prompt、Reference，以及脚本和测试如何围绕课程协作。</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .panel { fill: #ffffff; stroke: #d8deea; stroke-width: 2; rx: 20; }
      .accent { fill: #e9f1ff; stroke: #7aa2ff; stroke-width: 2; rx: 20; }
      .support { fill: #eef7f2; stroke: #7cbf95; stroke-width: 2; rx: 18; }
      .line { stroke: #66758f; stroke-width: 3; fill: none; }
      .title { font: 700 30px 'Helvetica Neue', Arial, sans-serif; fill: #213045; }
      .label { font: 700 22px 'Helvetica Neue', Arial, sans-serif; fill: #243247; }
      .copy { font: 400 15px 'Helvetica Neue', Arial, sans-serif; fill: #5b6880; }
      .small { font: 600 17px 'Helvetica Neue', Arial, sans-serif; fill: #2f3d55; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#66758f"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="620"/>
  <text class="title" x="56" y="58">新人快速理解 AI：课程系统结构</text>

  <rect class="accent" x="70" y="120" width="220" height="110" rx="20"/>
  <text class="label" x="140" y="164">目录</text>
  <text class="copy" x="112" y="194">README / 课程总览</text>

  <rect class="panel" x="350" y="90" width="290" height="170" rx="20"/>
  <text class="label" x="443" y="132">课程模块</text>
  <text class="copy" x="382" y="164">模块 1 到模块 10</text>
  <text class="copy" x="406" y="188">概念、方法、案例、图示</text>
  <text class="copy" x="433" y="212">每个模块都有主入口和参考索引</text>

  <rect class="panel" x="720" y="90" width="220" height="170" rx="20"/>
  <text class="label" x="774" y="132">学习 Prompt</text>
  <text class="copy" x="760" y="164">把模糊任务说清楚</text>
  <text class="copy" x="764" y="188">把理解变成动作</text>

  <rect class="panel" x="1000" y="90" width="220" height="170" rx="20"/>
  <text class="label" x="1055" y="132">课程考核</text>
  <text class="copy" x="1042" y="164">阶段测验 / 期末测试</text>
  <text class="copy" x="1055" y="188">回炉与复盘规则</text>

  <rect class="support" x="280" y="350" width="260" height="150" rx="18"/>
  <text class="label" x="350" y="395">Reference</text>
  <text class="copy" x="322" y="426">官方文档与高可信入口</text>
  <text class="copy" x="320" y="450">需要时再回查，不抢主线</text>

  <rect class="support" x="620" y="350" width="260" height="150" rx="18"/>
  <text class="label" x="700" y="395">脚本</text>
  <text class="copy" x="676" y="426">校验题库、评分、生成报告</text>
  <text class="copy" x="670" y="450">把课程规则落到执行层</text>

  <rect class="support" x="960" y="350" width="220" height="150" rx="18"/>
  <text class="label" x="1034" y="395">测试</text>
  <text class="copy" x="1006" y="426">确保题库和评分逻辑</text>
  <text class="copy" x="1041" y="450">持续可验证</text>

  <path class="line" d="M290 175 H350" marker-end="url(#arrow)"/>
  <path class="line" d="M640 175 H720" marker-end="url(#arrow)"/>
  <path class="line" d="M940 175 H1000" marker-end="url(#arrow)"/>
  <path class="line" d="M495 260 V350" marker-end="url(#arrow)"/>
  <path class="line" d="M790 260 V350" marker-end="url(#arrow)"/>
  <path class="line" d="M1110 260 V350" marker-end="url(#arrow)"/>

  <text class="small" x="58" y="560">主线是：目录建立地图，模块承载学习，Prompt 帮你推进任务，考核逼出真实理解。</text>
  <text class="copy" x="58" y="588">Reference、脚本和测试都不是主角，但它们让这套课程更稳、更可验证，也更容易持续维护。</text>
</svg>
